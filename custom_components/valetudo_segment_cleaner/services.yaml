clean_segments_by_name:
  name: Clean segments by name
  description: Resolve Valetudo segment names to IDs and publish an MQTT command to Valetudo.
  fields:
    entry_id:
      name: Integration entry ID
      description: Optional config entry ID. Required when multiple integration entries are configured.
      required: false
      selector:
        text:
    vacuum_entity_id:
      name: Vacuum entity
      description: Vacuum entity ID. Optional when default_vacuum_entity_id is set in integration options.
      required: false
      selector:
        entity:
          domain: vacuum
    segment_names:
      name: Segment names
      description: One or more segment names as shown by Valetudo.
      required: true
      selector:
        object:
    robot_id:
      name: Robot ID
      description: Optional robot ID. Required only when multiple robots are discovered.
      required: false
      selector:
        text:
    execute:
      name: Execute cleaning command
      description: Keep false while validating. If true, command is sent.
      required: false
      default: false
      selector:
        boolean:
    command:
      name: Vacuum command
      description: Vacuum command (defaults to app_segment_clean).
      required: false
      default: app_segment_clean
      selector:
        text:
    stop_and_dock_after_start:
      name: Stop and dock immediately after start
      description: Safety switch for testing to avoid full cleaning runs.
      required: false
      default: true
      selector:
        boolean:

clean_selected_segments:
  name: Clean selected segments
  description: Clean segments selected via segment switch entities generated by this integration.
  fields:
    entry_id:
      name: Integration entry ID
      description: Optional config entry ID. Required when multiple integration entries are configured.
      required: false
      selector:
        text:
    vacuum_entity_id:
      name: Vacuum entity
      description: Vacuum entity ID. Optional when default_vacuum_entity_id is set in integration options.
      required: false
      selector:
        entity:
          domain: vacuum
    robot_id:
      name: Robot ID
      description: Optional robot ID. Required only when multiple robots are discovered and no default is set.
      required: false
      selector:
        text:
    execute:
      name: Execute cleaning command
      description: If false, only emits event and logs request.
      required: false
      default: true
      selector:
        boolean:
    command:
      name: Vacuum command
      description: Informational field retained for compatibility.
      required: false
      default: app_segment_clean
      selector:
        text:
    stop_and_dock_after_start:
      name: Stop and dock immediately after start
      description: Safety switch for testing to avoid full cleaning runs.
      required: false
      default: true
      selector:
        boolean:

refresh_segments:
  name: Refresh segment cache
  description: Log currently discovered robot IDs and segment cache state for selected entry.
  fields:
    entry_id:
      name: Integration entry ID
      description: Optional config entry ID. Required when multiple integration entries are configured.
      required: false
      selector:
        text:
